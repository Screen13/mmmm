<!DOCTYPE HTML>
<html>
    <head>
    	<title>M4Engine</title>
        <meta charset="utf-8">
    	<style>
            html{
                height: 100%;
                display: flex;
                justify-content: center;
                align-items: center;
            }
    		html, body {
    			margin: 0;
    			padding: 0;
    			background-color: #000000;
                cursor: none;

    		}
            canvas{
                display: block;
                margin: 0px auto;
            }


            @font-face {
                font-family: 'normal-font';
                src: url('m4engine/fonts/console_mio.woff') format('woff');
                font-weight: normal;
                font-style: normal;
            }
            @font-face {
                font-family: 'cinzelregular';
                src:url('m4engine/fonts/Cinzel-Regular-webfont.woff') format('woff');
                font-weight: normal;
                font-style: normal;
            }
            @font-face {
                font-family: 'notepen';
                src:url('m4engine/fonts/Notepen.woff') format('woff');
                font-weight: normal;
                font-style: normal;
            }
            @font-face {
                font-family: 'scream';
                src:url('m4engine/fonts/UnfinishedScreamRegular.woff') format('woff');
                font-weight: normal;
                font-style: normal;
            }
            /* fuentes pixel CJK: solo aportan los glifos chinos, via fallback
               en las pilas "normal-font, zh-console" etc. */
            @font-face {
                font-family: 'zh-console';
                src:url('m4engine/fonts/zh_console.woff2') format('woff2');
                font-weight: normal;
                font-style: normal;
            }
            @font-face {
                font-family: 'zh-elegant';
                src:url('m4engine/fonts/zh_elegant.woff2') format('woff2');
                font-weight: normal;
                font-style: normal;
            }
            @font-face {
                font-family: 'zh-notepen';
                src:url('m4engine/fonts/zh_notepen.woff2') format('woff2');
                font-weight: normal;
                font-style: normal;
            }

            #loading{
                color: #ffffff;
                font-size: 30px;
                font-family: normal-font;
                text-align: center;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -100%);
                margin:0;
                padding: 0;
            }
    	</style>

        <!-- vendors -->
        <script src="m4engine/vendors/howler/howler.min.js"></script>
    	<script src="m4engine/vendors/pixijs/pixi.min.js"></script>
    	<script>
    	//bugfix para el problema de fuentes cortadas en pixi v3

    	PIXI.Text.prototype.determineFontProperties = function(fontStyle){
    		var properties = PIXI.Text.fontPropertiesCache[fontStyle];
    		if(properties){		return properties;	}
    		properties =  {
    			ascent: 10,
    			descent: 10,
    			fontSize: 20	};
    			PIXI.Text.fontPropertiesCache[fontStyle] = properties;
    			return properties;
    	}

    	</script>

        <!-- motor -->
        <script src="m4engine/KeyboardModule.js"></script>
        <script src="m4engine/Utilities.js"></script>
        <script src="m4engine/Pathfinding.js"></script>
        <script src="m4engine/LActions.js"></script>
        <script src="m4engine/M4Sound.js"></script>
        <script src="m4engine/M4Thing.js"></script>
        <script src="m4engine/Text.js"></script>
        <script src="m4engine/VerbIcon.js"></script>
        <script src="m4engine/Dialog.js"></script>
        <script src="m4engine/Item.js"></script>
        <script src="m4engine/Camera.js"></script>
        <script src="m4engine/Scene.js"></script>
        <script src="m4engine/Character.js"></script>
        <script src="m4engine/Inventory.js"></script>
        <script src="m4engine/Notebook.js"></script>
        <script src="m4engine/Actions.js"></script>
        <script src="m4engine/Options.js"></script>
        <script src="m4engine/Cursor.js"></script>
        <script src="m4engine/Osd.js"></script>

        <!-- datos del juego: la lista de escenas/dialogos vive en gamedata/manifest.js -->
        <script src="gamedata/manifest.js"></script>
        <script>
        for(var i=0; i<gamedataManifest.length; i++){
            document.write('<script src="gamedata/'+gamedataManifest[i]+'"><\/script>');
        }
        </script>

        <!-- el Core arranca el juego, siempre el ultimo -->
        <script src="m4engine/Core.js"></script>

    </head>
    <body>
        <p id="loading">Loading...</p>
    </body>
</html>
